upstream auth_service {
    server auth-service:8000;
}

upstream user_service {
    server user-service:8000;
}

upstream product_service {
    server product-service:8000;
}

upstream cart_service {
    server cart-service:8000;
}

upstream order_service {
    server order-service:8000;
}

upstream billing_service {
    server billing-service:8000;
}

upstream notification_service {
    server notification-service:8000;
}

# CORS variables for reuse
map $http_origin $cors_origin {
    default "";
    "~^https?://localhost(:[0-9]+)?$" $http_origin;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # UI (static)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Access-Control-Allow-Origin $cors_origin always;
    }

    location = /swagger.html {
        root /usr/share/nginx/html;
        default_type text/html;
        add_header Access-Control-Allow-Origin $cors_origin always;
    }

    location = /docs {
        rewrite ^ /swagger.html last;
    }

    location = /openapi.json {
        return 404 '{"error": "Not Found. Use /{service}/openapi.json"}';
        add_header Content-Type application/json;
    }

    location /auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Session-Id, X-Idempotency-Key" always;
    }

    location /user/ {
        proxy_pass http://user_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Session-Id" always;
    }

    location /products/ {
        proxy_pass http://product_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Session-Id" always;
    }

    location /cart/ {
        proxy_pass http://cart_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Session-Id $http_x_session_id;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Session-Id" always;
        expires -1;
    }

    location /orders/ {
        proxy_pass http://order_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Session-Id, X-Idempotency-Key" always;
    }

    location /billing/ {
        proxy_pass http://billing_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Session-Id" always;
    }

    location /ws/ {
        proxy_pass http://notification_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /notifications/ {
        proxy_pass http://notification_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Session-Id" always;
    }

    location /health {
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # Swagger docs
    location /auth/docs {
        proxy_pass http://auth_service/docs;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '/openapi.json' '/auth/openapi.json';
        sub_filter_once off;
    }
    location /auth/openapi.json {
        proxy_pass http://auth_service/openapi.json;
        proxy_set_header Host $host;
    }

    location /user/docs {
        proxy_pass http://user_service/docs;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '/openapi.json' '/user/openapi.json';
        sub_filter_once off;
    }
    location /user/openapi.json {
        proxy_pass http://user_service/openapi.json;
        proxy_set_header Host $host;
    }

    location /products/docs {
        proxy_pass http://product_service/docs;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '/openapi.json' '/products/openapi.json';
        sub_filter_once off;
    }
    location /products/openapi.json {
        proxy_pass http://product_service/openapi.json;
        proxy_set_header Host $host;
    }

    location /cart/docs {
        proxy_pass http://cart_service/docs;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '/openapi.json' '/cart/openapi.json';
        sub_filter_once off;
    }
    location /cart/openapi.json {
        proxy_pass http://cart_service/openapi.json;
        proxy_set_header Host $host;
    }

    location /orders/docs {
        proxy_pass http://order_service/docs;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '/openapi.json' '/orders/openapi.json';
        sub_filter_once off;
    }
    location /orders/openapi.json {
        proxy_pass http://order_service/openapi.json;
        proxy_set_header Host $host;
    }

    location /billing/docs {
        proxy_pass http://billing_service/docs;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '/openapi.json' '/billing/openapi.json';
        sub_filter_once off;
    }
    location /billing/openapi.json {
        proxy_pass http://billing_service/openapi.json;
        proxy_set_header Host $host;
    }

    location /notifications/docs {
        proxy_pass http://notification_service/docs;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter '/openapi.json' '/notifications/openapi.json';
        sub_filter_once off;
    }
    location /notifications/openapi.json {
        proxy_pass http://notification_service/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        return 302 '/docs';
    }
}
